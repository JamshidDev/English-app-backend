name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/English-app-backend
            git pull origin main
            npm install
            npm run build
            NODE_ENV=production npx drizzle-kit push --force
            pm2 reload ecosystem.config.js --env production
            echo "Deploy completed!"

  notify:
    name: Telegram Notification
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *EasyEnglish CI/CD*

            *Commit:* `${{ github.event.head_commit.message }}`
            *Branch:* `${{ github.ref_name }}`
            *Author:* ${{ github.actor }}

            *Build:* ${{ needs.build.result == 'success' && '✅ Success' || '❌ Failed' }}
            *Deploy:* ${{ needs.deploy.result == 'success' && '✅ Success' || needs.deploy.result == 'skipped' && '⏭ Skipped' || '❌ Failed' }}

            [View Action](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
